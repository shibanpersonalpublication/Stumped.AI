<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Stumped.AI - Cricket Document Reader</title>
    
    <!-- External Dependencies -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Outfit', 'sans-serif'] },
                    colors: {
                        cricket: { pitch: '#2ECC71', dark: '#0f172a', leather: '#E74C3C', sky: '#3498DB', light: '#f8fafc' }
                    }
                }
            }
        }
    </script>

    <style>
        body { font-family: 'Outfit', sans-serif; transition: background-color 0.3s ease; }
        .glass-panel {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(226, 232, 240, 0.8);
        }
        .dark .glass-panel { 
            background: rgba(15, 23, 42, 0.6); 
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(156, 163, 175, 0.3); }

        /* Responsive Fixes */
        @media (max-width: 768px) {
            #sidebar { transform: translateX(-100%); }
            #sidebar.open { transform: translateX(0); }
        }
    </style>
</head>

<body class="bg-slate-100 dark:bg-slate-900 h-screen w-screen overflow-hidden flex transition-colors duration-300 text-slate-900 dark:text-slate-100">

    <!-- Mobile Sidebar Backdrop -->
    <div id="mobileBackdrop" class="fixed inset-0 bg-black/50 z-20 hidden md:hidden" onclick="UI.toggleSidebar()"></div>

    <!-- Sidebar -->
    <aside class="fixed md:relative w-72 h-full glass-panel border-r border-slate-200 dark:border-white/10 z-30 transition-transform duration-300" id="sidebar">
        <div class="p-6 border-b border-slate-200 dark:border-white/10 flex items-center gap-3">
            <div class="w-10 h-10 rounded-full bg-green-500 flex items-center justify-center text-white"><i class="fa-solid fa-cricket-bat-ball"></i></div>
            <h1 class="text-xl font-bold">Stumped.AI</h1>
        </div>
        
        <div class="flex-1 overflow-y-auto p-4 custom-scrollbar" id="chatHistoryList"></div>

        <div class="p-4 border-t border-slate-200 dark:border-white/10">
            <button onclick="UI.toggleTheme()" class="w-full py-2 rounded-lg bg-slate-200 dark:bg-white/10 flex items-center justify-center gap-2">
                <i class="fa-solid fa-circle-half-stroke"></i> Toggle Theme
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col h-full relative overflow-hidden">
        <header class="h-16 flex items-center px-4 md:px-6 border-b border-slate-200 dark:border-white/10 gap-4">
            <button class="md:hidden text-xl" onclick="UI.toggleSidebar()"><i class="fa-solid fa-bars"></i></button>
            <nav id="featureNav" class="flex-1 flex gap-2 overflow-x-auto custom-scrollbar whitespace-nowrap py-2">
                <button onclick="App.requestViewChange('chat')" class="px-4 py-1.5 rounded-lg text-sm bg-green-500/10 text-green-600 font-bold">Chat</button>
                <button onclick="App.requestViewChange('quiz')" class="px-4 py-1.5 rounded-lg text-sm bg-slate-200 dark:bg-white/5">Quiz</button>
                <button onclick="App.requestViewChange('infographic')" class="px-4 py-1.5 rounded-lg text-sm bg-slate-200 dark:bg-white/5">Visuals</button>
            </nav>
        </header>

        <div id="viewContainer" class="flex-1 overflow-hidden relative">
            <section id="view-chat" class="absolute inset-0 flex flex-col md:flex-row">
                <!-- Left: Chat -->
                <div class="flex-1 flex flex-col h-[50vh] md:h-full border-b md:border-b-0 md:border-r border-slate-200 dark:border-white/10">
                    <div id="chatMessages" class="flex-1 overflow-y-auto p-4 space-y-4 custom-scrollbar"></div>
                    <div class="p-4 border-t border-slate-200 dark:border-white/10 flex gap-2">
                        <textarea id="chatInput" class="flex-1 bg-white dark:bg-black/20 border border-slate-300 dark:border-white/10 rounded-xl p-3 resize-none text-sm" placeholder="Ask question..."></textarea>
                        <button onclick="Chat.sendMessage()" class="w-12 rounded-xl bg-green-500 text-white shrink-0"><i class="fa-solid fa-paper-plane"></i></button>
                    </div>
                </div>
                <!-- Right: Viewer -->
                <div class="flex-1 flex flex-col h-[50vh] md:h-full bg-white dark:bg-black/20">
                    <div class="p-2 border-b flex gap-2">
                        <select id="activeFileSelect" onchange="UI.switchActiveFile()" class="flex-1 bg-slate-200 dark:bg-black/40 text-sm p-1 rounded"></select>
                        <button onclick="Viewer.prevPage()" class="px-2"><i class="fa-solid fa-chevron-left"></i></button>
                        <span id="pageIndicator" class="text-xs self-center">Pg 1/1</span>
                        <button onclick="Viewer.nextPage()" class="px-2"><i class="fa-solid fa-chevron-right"></i></button>
                    </div>
                    <div id="documentPreview" class="flex-1 overflow-auto p-2 flex justify-center"></div>
                </div>
            </section>
        </div>
    </main>

    <script>
        // Minimal core logic to enable functionality
        const State = { currentSessionId: null, sessions: [], activeFileIndex: 0 };
        const App = {
            init: () => { console.log("Stumped.AI Ready."); },
            handleFiles: (files) => { UI.showToast("Success", "File(s) processed!"); App.switchView('chat'); },
            switchView: (v) => { /* logic */ },
            requestViewChange: (v) => { /* logic */ }
        };
        const UI = {
            toggleSidebar: () => document.getElementById('sidebar').classList.toggle('open'),
            toggleTheme: () => document.documentElement.classList.toggle('dark'),
            showToast: (t, m) => { /* toast logic */ },
            showLoader: () => {}, hideLoader: () => {},
            switchActiveFile: () => {}
        };
        const Viewer = { prevPage: () => {}, nextPage: () => {}, updatePagination: () => {} };
        const Chat = { sendMessage: () => {} };
        const Features = { initFlashcardSwipe: () => {} };

        window.addEventListener('DOMContentLoaded', App.init);
    </script>
</body>
</html>
